services:
  postgres:
    container_name: postgres
    image: postgres:18
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-postgres}"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nest-base}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGUSER: "${POSTGRES_USERNAME:-postgres}"
      PGPASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    networks:
      - nest_base
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10

  redis:
    container_name: redis
    image: redis:8-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - nest_base
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    container_name: app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      # REDIS_URL: redis://:${REDIS_PASSWORD:-password}@redis:6379
      S3_ENDPOINT: http://seaweedfs-filer:8333
      S3_PUBLIC_URL: http://seaweedfs-filer:8888/buckets/medias
      KAFKA_HOST: redpanda
      KAFKA_PORT: 29092
    networks:
      - nest_base
    volumes:
      - logs:/app/logs

  redpanda:
    container_name: redpanda
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --check=false
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "29092:29092"
    networks:
      - nest_base

  opensearch:
    container_name: opensearch
    image: opensearchproject/opensearch:2.11.0
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m"
      - DISABLE_INSTALL_DEMO_CONFIG=false
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    networks:
      - nest_base

  opensearch-dashboards:
    container_name: opensearch-dashboards
    image: opensearchproject/opensearch-dashboards:2.11.0
    volumes:
      - ./fluent-bit/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    ports:
      - "${DASHBOARDS_PORT:-5601}:5601"
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
      - OPENSEARCH_USERNAME=${OPENSEARCH_ADMIN_USER:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
    networks:
      - nest_base

  fluent-bit-shipper:
    container_name: fluent-bit-shipper
    image: fluent/fluent-bit:latest
    volumes:
      - ./fluent-bit/shipper.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
      - ./logs:/app/logs:ro
    networks:
      - nest_base
    depends_on:
      - redpanda

  fluent-bit-indexer:
    container_name: fluent-bit-indexer
    image: fluent/fluent-bit:latest
    volumes:
      - ./fluent-bit/indexer.conf:/fluent-bit/etc/fluent-bit.conf
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf
    environment:
      - OPENSEARCH_ADMIN_USER=${OPENSEARCH_ADMIN_USER:-admin}
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD:-admin}
    networks:
      - nest_base
    depends_on:
      - redpanda
      - opensearch

  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-master
    command: "master -ip=seaweedfs-master -mdir=/data"
    ports:
      - "9333:9333"
    volumes:
      - seaweedfs_data:/data
    networks:
      - nest_base

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-volume
    command: "volume -mserver=seaweedfs-master:9333 -port=8080 -ip=seaweedfs-volume -dir=/data"
    depends_on:
      - seaweedfs-master
    volumes:
      - seaweedfs_data:/data
    networks:
      - nest_base
    ports:
      - "${SEAWEEDFS_VOLUME_PORT:-8080}:8080"

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs-filer
    command: 'filer -master="seaweedfs-master:9333" -s3 -s3.config="/etc/seaweedfs/s3.json"'
    ports:
      - "${SEAWEEDFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEDFS_FILER_S3_PORT:-8333}:8333"
    volumes:
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    networks:
      - nest_base

volumes:
  pgdata:
  redisdata:
  opensearch_data:
  seaweedfs_data:
  logs:

networks:
  nest_base:
    driver: bridge
